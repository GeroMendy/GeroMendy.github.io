<head>

    <link rel="stylesheet" href="../css/entregable03/master.css">
</head>

<body>
    <div id="burger_menu">

    <div id="pantalla_carga">
        <img src="../img/entregable03/loading_spinner.svg" alt="">
    </div>

    <div id="position_helper"></div>
    <div id="hero_parallax_principal" class="js-parallax_fixed">

        <img src="../img/entregable03/parallax_backgrounds/red_sunset_logo_layer0.png" alt="" class="parallax_layer">
        <img src="../img/entregable03/parallax_backgrounds/red_sunset_logo_layer1.png" alt="" class="parallax_layer">
        <img src="../img/entregable03/parallax_backgrounds/red_sunset_logo_layer2.png" alt="" class="parallax_layer">

    </div>
    <div id="limit_parallax_helper">

    </div>


    <div class="multimedia">
        <h2>Galer&iacutea</h2>

        <div id="carrusel">
            <div class="js-carrusel_button">
                <img src="../img/entregable03/carrusel_previous_icon(b).png" alt="">

            <div class="js-carrusel_button">
                <img src="../img/entregable03/carrusel_next_icon(b).png" alt="">
            </div>

        </div>
        <div class="trailer">
            <p> Trailer internacional:</p>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/_iH0UBYDI4g" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
        </div>
    </div>

    <div id="character_cards">
        <h2>Personajes principales</h2>
        <div class="js-card_container">
            <img class="js-card3D" src="../img/entregable03/characters/king_schultz_3DCard.jpg" alt="">
        </div>
        <div class="js-card_container">
            <img class="js-card3D" src="../img/entregable03/characters/django_3DCard.jpg" alt="">
        </div>
        <div class="js-card_container">
            <img class="js-card3D" src="../img/entregable03/characters/calvin_candie_3DCard.jpg" alt="">

        </div>
        <div class="js-card_container">
            <img class="js-card3D" src="../img/entregable03/characters/billy_crash_3DCard.jpg" alt="">
        </div>
    </div>

    <div id="footer_margin_helper"></div>
    <div id="footer">
        <div class="countdown">
            <img src="../img/entregable03/tiempo_restante/texto(light).png" alt="">
            <div class="footer_fecha_countdown footer_dias countdown_centena"></div>
