<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP2 - Ejercicio Entregable</title>
    <link rel="stylesheet" href="../css/entregable02/master.css">
</head>

<body>

    <div id="js-canvas_container">
        <canvas id="js-canvas" width="4000" height="4000"></canvas>
    </div>
    
    <div class="elem_debajo_de_canvas">
        <label for="">Ancho del tablero : </label>
        <input type="number" value="7" class="js-size_tablero">
    </div>
    <div class="elem_debajo_de_canvas">
        <label for="">Alto del tablero : </label>
        <input type="number" value="6" class="js-size_tablero">
    </div>
    <div class="elem_debajo_de_canvas">
        <label for="">Fichas necesarias para ganar : </label>
        <input type="number" value="4" min="3" id="js-fichas_necesarias_para_victoria">
    </div>

    <button class="elem_debajo_de_canvas" id="js-change_rules">Cambiar reglas del juego</button>

    <button class="elem_debajo_de_canvas" id="js-set_default">Cambiar reglas a default</button>
   
    <button class="elem_debajo_de_canvas" id="js-reset_game">Reiniciar</button>
    
    <div id="js-opponent_selector" class="elem_debajo_de_canvas">
        <button id="js-vs_bot">Jugar vs AI</button>
        <button id="js-vs_human">Jugar vs player</button>
    </div>

    <script src="../js/entregable02/ficha.js"></script>
    <script src="../js/entregable02/casilla.js"></script>
    <script src="../js/entregable02/main.js"></script>
    <script src="../js/entregable02/collider.js"></script>
    <script src="../js/entregable02/bot.js"></script>
    <script src="../js/color_converter.js"></script>
</body>

</html>
